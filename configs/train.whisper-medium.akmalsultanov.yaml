experiment:
  output_dir: outputs/whisper-medium-akmalsultanov
  tensorboard_dir: outputs/whisper-medium-akmalsultanov/tensorboard
  seed: 42
  run_name: whisper-medium-akmalsultanov
  unique_output_dir: true
  save_config_snapshot: true

cache:
  root_dir: .cache
  model_dir: .cache/models
  dataset_dir: .cache/datasets

hub:
  enabled: false
  repo_id: akmalsultanov/whisper-medium
  private: true
  token_env_var: HF_TOKEN
  commit_message: Upload final Whisper finetune artifacts
  replace_existing_repo_files: true
  export_subdir: hf-export

model:
  name_or_path: islomov/rubaistt_v2_medium
  task: transcribe
  freeze_encoder: false
  generation_max_length: 225
  remove_encoder_input_length_restriction: true

data:
  audio_sampling_rate: 16000
  preprocessing_num_workers: 4
  min_audio_seconds: 0.1
  max_audio_seconds: 30.0
  text_normalization:
    lowercase: false
    strip: true
    collapse_whitespace: true
  audio_augmentation:
    enabled: true
    seed: 42
    train_only: true
    mode: deterministic_per_sample
    datasets:
      lb_tg_raw_4k:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      lb_xorazm:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      sarf_full:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      odamiylik_mulki:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      usc_cleaned:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      uzvoice:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      commonvoice:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      usta_va_margarita:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      dahshat:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      ikki_eshik_orasi:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      negr_bolasi:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      dumli_odamlar:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      jonifigron:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      besh:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      kassandra_tamgasi:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      mahalla:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      ojar:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      molhona:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      yulduzlar:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      bahor_qaytmaydi:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      champo:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      sheva_small:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      uzbooks:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      conv:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
    profiles:
      phone_like:
        codec:
          p: 0.9
          backend: fast
          modes:
            mulaw_narrowband: 1.0
          sample_rate: 8000
          highpass_hz: 320.0
          lowpass_hz: 3000.0
          roundtrips: 1
        noise:
          p: 0.12
          snr_db: [22.0, 30.0]
        clipping:
          p: 0.12
          threshold: [0.82, 0.92]
        packet_loss:
          p: 0.0
          burst_ms: [20, 50]
          bursts: [1, 2]
          fill: hold
  datasets:
    - repo_id: akmalsultanov/lb_tg_raw_4k
      alias: lb_tg_raw_4k
      language: uz
      train_split: train
      validation_from_train_ratio: 0.05
      validation_from_train_seed: 42
      audio_column: audio
      text_column: transcription
    - repo_id: akmalsultanov/lb_xorazm
