experiment:
  output_dir: outputs/whisper-medium-akmalsultanov_stage_b
  tensorboard_dir: outputs/whisper-medium-akmalsultanov/tensorboard
  seed: 42
  run_name: whisper-medium-akmalsultanov
  unique_output_dir: true
  save_config_snapshot: true

cache:
  root_dir: .cache
  model_dir: .cache/models
  dataset_dir: .cache/datasets

hub:
  enabled: true
  repo_id: akmalsultanov/whisper-medium-stage_b
  private: true
  token_env_var: HF_TOKEN
  commit_message: Upload final Whisper finetune artifacts
  replace_existing_repo_files: true
  export_subdir: hf-export

model:
  name_or_path: akmalsultanov/whisper-medium-stage_a
  task: transcribe
  freeze_encoder: false
  generation_max_length: 225
  remove_encoder_input_length_restriction: true

data:
  audio_sampling_rate: 16000
  download_num_workers: 8
  preprocessing_num_workers: 1
  min_audio_seconds: 0.1
  max_audio_seconds: 30.0
  max_label_tokens: 444
  text_normalization:
    lowercase: false
    strip: true
    collapse_whitespace: true
  audio_augmentation:
    enabled: true
    seed: 42
    train_only: true
    mode: deterministic_per_sample
    datasets:
      lb_tg_raw_4k:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      lb_xorazm:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      sarf_full:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      sheva_small:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      conv:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
      yt:
        enabled: true
        profile: phone_like
        splits: [train]
        apply_p: 0.8
    profiles:
      phone_like:
        codec:
          p: 0.9
          backend: fast
          modes:
            mulaw_narrowband: 1.0
          sample_rate: 8000
          highpass_hz: 320.0
          lowpass_hz: 3000.0
          roundtrips: 1
        noise:
          p: 0.12
          snr_db: [22.0, 30.0]
        clipping:
          p: 0.12
          threshold: [0.82, 0.92]
        packet_loss:
          p: 0.0
          burst_ms: [20, 50]
          bursts: [1, 2]
          fill: hold
  datasets:
    - repo_id: akmalsultanov/lb_tg_raw_4k
      alias: lb_tg_raw_4k
      language: uz
      train_split: train
      validation_from_train_ratio: 0.05
      validation_from_train_seed: 42
      audio_column: audio
      text_column: transcription
    - repo_id: akmalsultanov/lb_xorazm
      alias: lb_xorazm
      language: uz
      train_split: train
      validation_from_train_ratio: 0.05
      validation_from_train_seed: 42
      audio_column: audio
      text_column: transcription
    - repo_id: akmalsultanov/sarf_full
      alias: sarf_full
      language: uz
      train_split: train
      validation_from_train_ratio: 0.05
      validation_from_train_seed: 42
      audio_column: audio
      text_column: transcription
    - repo_id: akmalsultanov/conv_stt
      alias: conv
      language: uz
      train_split: train
      audio_column: audio
      text_column: text
    - repo_id: akmalsultanov/yt_news_tutorials
      alias: yt
      language: uz
      train_split: train
      audio_column: audio
      text_column: text
    - repo_id: akmalsultanov/sheva_small
      alias: sheva_small
      language: uz
      train_split: train
      audio_column: audio
      text_column: text
      validation_split: test

training:
  per_device_train_batch_size: 36
  per_device_eval_batch_size: 24
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-4
  warmup_ratio: 0.15
  num_train_epochs: 2
  max_steps: -1
  lr_scheduler_type: linear
  logging_steps: 25
  eval_steps: 1500
  save_steps: 1000
  save_total_limit: 2
  generation_num_beams: 1
  predict_with_generate: true
  report_to:
    - tensorboard
  fp16: false
  bf16: true
  gradient_checkpointing: false
  dataloader_num_workers: 16
  train_sampling_strategy: random
  length_grouping_key: null
  load_best_model_at_end: false
  final_eval: false
  metric_for_best_model: wer
  greater_is_better: false
  optim: adamw_torch
  weight_decay: 0.01
  label_smoothing_factor: 0.0
  max_grad_norm: 1.0
  deepspeed_config: deepspeed/zero2.json
  checkpoint_save_mode: full
